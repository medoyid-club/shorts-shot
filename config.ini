[GENERAL]
# Основной конфиг: продакшен — YouTube (см. [YOUTUBE]), без LOCAL_ONLY в .env
upload_to_telegram = false
# Опционально: корень репозитория shorts_news для расширенного Telegram publisher (скрипты/ config).
# Пример Ubuntu: /opt/shorts_news. Пусто = путь только из .env TELEGRAM_SHORTS_NEWS_PATH или без расширений.
telegram_shorts_news_path =
# Песочница: только outputs/*.mp4, без YouTube (OAuth не нужен). В .env: LOCAL_ONLY=1
local_only = false

[TELEGRAM]
# Подставляется из .env
api_id = ${TELEGRAM_API_ID}
api_hash = ${TELEGRAM_API_HASH}
channel = ${TELEGRAM_CHANNEL}
startup_backfill = 0
poll_interval_seconds = 10

[LLM]
provider = gemini
gemini_model = gemini-3.1-flash-lite
# При local_only / LOCAL_ONLY=1: если true — автоматически Ollama. false — Gemini (provider выше).
# Или переопределение: LLM_PROVIDER=gemini | ollama
sandbox_use_ollama = false
# Локальная модель для песочницы (должна реально грузиться в Ollama; gemma4-26b у части установок битый путь через Pinokio)
sandbox_ollama_model = llama3.2:3b
ollama_url = http://localhost:11434
ollama_model = gemma3:1b
# Ручной режим без песочницы: LLM_PROVIDER=ollama и ollama_model выше

[VIDEO]
# ВЕРСИЯ ГЕНЕРАТОРА
generator_version = v2
# Базовые параметры кадра
duration_seconds = 6
width = 1080
height = 1920
# Шрифт; подпись источника в кадре (пусто = не показывать)
font_path = resources/fonts/Arsenal-Bold.ttf
source_text =
# Шаблон V2: fullscreen V4 (медиа сверху + шитрон)
# Несколько шаблонов: v2_template_pool = path1,path2,...
v2_template_path = resources/templates/news_short_v4_fullscreen.html
# Только при LOCAL_ONLY / local_only: подмена шаблона (обычно тот же файл, что и выше)
v2_sandbox_template_path = resources/templates/news_short_v4_fullscreen.html
v2_fps = 24
v2_capture_method = cdp
v2_headless = true
# Зафиксировать цветовую тему V4 1..5 (отладка). Пусто / 0 / random = случайная тема
# v2_sandbox_theme_debug =

[YOUTUBE]
# Для публикации на канал обычно: public или unlisted
privacy_status = private
category_id = 25
client_secret_file = ${YOUTUBE_CLIENT_SECRET_FILE}

# Забор медиа из ссылок X/Twitter (ingest → Shorts). Не путать с [TWITTER] upload.
[TWITTER_MEDIA]
enabled = true
max_duration_seconds = 600

# Исходящий постинг в X — выключен
[TWITTER]
enabled = false
api_key = ${TWITTER_API_KEY}
api_secret = ${TWITTER_API_SECRET}
access_token = ${TWITTER_ACCESS_TOKEN}
access_token_secret = ${TWITTER_ACCESS_TOKEN_SECRET}
upload_mode = image

[PATHS]
music_dir = resources/music
backgrounds_dir = resources/default_backgrounds
outputs_dir = outputs
tmp_dir = resources/tmp
state_dir = state
resources_dir = resources

